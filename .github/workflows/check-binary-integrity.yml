name: Binary Integrity Check

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-hashes:
    name: Check Pinned Binary Hashes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify pinned hashes
        shell: pwsh
        run: ./scripts/security/Test-BinaryFreshness.ps1 -SarifFile binary-freshness-results.sarif

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: binary-freshness-results.sarif
          category: binary-freshness
        continue-on-error: true
