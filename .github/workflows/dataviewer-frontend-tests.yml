name: Dataviewer Frontend Tests

on:
  workflow_call:
    inputs:
      code-coverage:
        description: 'Enable Codecov coverage upload'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Lint, Type-check, Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-management/viewer/frontend
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version-file: data-management/viewer/frontend/.nvmrc
          cache: npm
          cache-dependency-path: data-management/viewer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        run: npm run format

      - name: Unit tests
        if: ${{ !inputs.code-coverage }}
        run: npm run test

      - name: Unit tests with coverage
        if: ${{ inputs.code-coverage }}
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: ${{ inputs.code-coverage && always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vitest-coverage-xml
          path: data-management/viewer/frontend/coverage/cobertura-coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: ${{ inputs.code-coverage && always() }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: coverage/cobertura-coverage.xml
          use_oidc: true
          fail_ci_if_error: false
          verbose: true
          flags: vitest
          name: vitest-coverage
