name: Dataviewer Frontend Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - data-management/viewer/frontend/**
      - .github/workflows/dataviewer-frontend-tests.yml
  push:
    branches:
      - main
    paths:
      - data-management/viewer/frontend/**
      - .github/workflows/dataviewer-frontend-tests.yml
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Lint, Type-check, Test and Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    defaults:
      run:
        working-directory: data-management/viewer/frontend
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2
        with:
          persist-credentials: false

      - name: Harden runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc  # v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: data-management/viewer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        run: npm run format

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
