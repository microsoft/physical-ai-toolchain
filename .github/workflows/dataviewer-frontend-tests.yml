name: Dataviewer Frontend Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - data-management/viewer/frontend/**
      - .github/workflows/dataviewer-frontend-tests.yml
  push:
    branches:
      - main
    paths:
      - data-management/viewer/frontend/**
      - .github/workflows/dataviewer-frontend-tests.yml
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Lint, Type-check, Test and Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    defaults:
      run:
        working-directory: data-management/viewer/frontend
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version-file: data-management/viewer/frontend/.nvmrc
          cache: npm
          cache-dependency-path: data-management/viewer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        id: format
        continue-on-error: true
        run: npm run format 2>&1 | tee format-results.txt

      - name: Unit tests
        id: tests
        continue-on-error: true
        run: npm run test 2>&1 | tee test-results.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v4.4.3
        with:
          name: frontend-test-results
          path: |
            data-management/viewer/frontend/lint-results.txt
            data-management/viewer/frontend/typecheck-results.txt
            data-management/viewer/frontend/format-results.txt
            data-management/viewer/frontend/test-results.txt
          retention-days: 30

      - name: Fail job if errors found
        if: >-
          (steps.lint.outcome == 'failure'
          || steps.typecheck.outcome == 'failure'
          || steps.format.outcome == 'failure'
          || steps.tests.outcome == 'failure')
          && !inputs.soft-fail
        run: |
          echo "::error::Frontend checks failed. Run 'npm run lint', 'npm run type-check', 'npm run format', and 'npm run test' locally to reproduce."
          exit 1
        continue-on-error: true

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
