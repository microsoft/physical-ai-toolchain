name: Dataviewer Frontend Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Lint, Type-check, Test and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: data-management/viewer/frontend
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version-file: data-management/viewer/frontend/.nvmrc
          cache: npm
          cache-dependency-path: data-management/viewer/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Format check
        run: npm run format

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
