name: DataViewer Image Publish

# Builds, signs, and publishes the DataViewer backend and frontend container images
# whenever a tag matching `dataviewer-v*` is pushed (or when manually dispatched).
# Delegates to the reusable container-publish workflow (cosign keyless) or the
# notation variant (AKV HSM) selected via the SIGNING_MODE repository variable.
# Forks must not publish to the production registry; the fork-guard `if:` blocks
# the publish jobs when the workflow runs outside microsoft/physical-ai-toolchain.

on:
  push:
    tags:
      - 'dataviewer-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. dataviewer-v1.4.0).'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: dataviewer-image-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: Resolve image tag
    if: github.repository == 'microsoft/physical-ai-toolchain'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$tag" ]]; then
            echo "::error::Unable to resolve image tag"
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  publish-cosign:
    name: Publish (cosign) - ${{ matrix.component }}
    needs: resolve-tag
    if: vars.SIGNING_MODE != 'notation'
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context_path: data-management/viewer/backend
            dockerfile_path: data-management/viewer/backend/Dockerfile
            vex_predicate_path: security/vex/dataviewer-backend.openvex.json
          - component: frontend
            context_path: data-management/viewer/frontend
            dockerfile_path: data-management/viewer/frontend/Dockerfile
            vex_predicate_path: security/vex/dataviewer-frontend.openvex.json
    uses: ./.github/workflows/container-publish.yml
    with:
      image_name: physical-ai/dataviewer-${{ matrix.component }}
      dockerfile_path: ${{ matrix.dockerfile_path }}
      context_path: ${{ matrix.context_path }}
      tag: ${{ needs.resolve-tag.outputs.tag }}
      registry: ${{ vars.ACR_REGISTRY_HOSTNAME }}
      vex_predicate_path: ${{ matrix.vex_predicate_path }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  publish-notation:
    name: Publish (notation) - ${{ matrix.component }}
    needs: resolve-tag
    if: vars.SIGNING_MODE == 'notation'
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context_path: data-management/viewer/backend
            dockerfile_path: data-management/viewer/backend/Dockerfile
          - component: frontend
            context_path: data-management/viewer/frontend
            dockerfile_path: data-management/viewer/frontend/Dockerfile
    uses: ./.github/workflows/container-publish-notation.yml
    with:
      image_name: physical-ai/dataviewer-${{ matrix.component }}
      dockerfile_path: ${{ matrix.dockerfile_path }}
      context_path: ${{ matrix.context_path }}
      tag: ${{ needs.resolve-tag.outputs.tag }}
      registry: ${{ vars.ACR_REGISTRY_HOSTNAME }}
      akv_key_id: ${{ vars.NOTATION_AKV_KEY_ID }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
