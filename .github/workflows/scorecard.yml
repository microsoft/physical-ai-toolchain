# OpenSSF Scorecard - Security health metrics for open source projects
# https://github.com/ossf/scorecard
# Results appear in the GitHub Security tab under Code scanning alerts

name: OpenSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    # Weekly scan: Sundays at 03:00 UTC
    - cron: "0 3 * * 0"

permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3.32.4
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: openssf-scorecard

      - name: Upload Scorecard results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 90
