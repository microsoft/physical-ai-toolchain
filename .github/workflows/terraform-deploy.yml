name: Terraform Deploy

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Terraform root directory to deploy (relative to repo root)'
        required: true
        type: string
      environment:
        description: 'GitHub environment for approval gates'
        required: true
        type: string
      tfvars-file:
        description: 'Path to the .tfvars file (relative to working-directory)'
        required: false
        type: string
        default: 'terraform.tfvars'
      state-key:
        description: 'Backend state key (e.g., platform.tfstate, vpn.tfstate)'
        required: true
        type: string
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      BACKEND_RESOURCE_GROUP_NAME:
        required: true
      BACKEND_STORAGE_ACCOUNT_NAME:
        required: true
      BACKEND_CONTAINER_NAME:
        required: true

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      has-changes: ${{ steps.plan.outputs.has-changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: 'true'
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ inputs.state-key }}" \
            -backend-config="use_oidc=true"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working-directory }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: 'true'
        run: |
          set -euo pipefail

          tfvars_arg=""
          if [[ -f "${{ inputs.tfvars-file }}" ]]; then
            tfvars_arg="-var-file=${{ inputs.tfvars-file }}"
          fi

          terraform plan $tfvars_arg -input=false -detailed-exitcode -out=tfplan 2>&1 | tee plan-output.txt || exit_code=$?

          # -detailed-exitcode: 0=no changes, 1=error, 2=changes present
          if [[ "${exit_code:-0}" -eq 2 ]]; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          elif [[ "${exit_code:-0}" -eq 0 ]]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            exit 1
          fi

      - name: Upload Plan
        if: steps.plan.outputs.has-changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-${{ inputs.state-key }}
          path: |
            ${{ inputs.working-directory }}/tfplan
            ${{ inputs.working-directory }}/plan-output.txt
          retention-days: 1

  apply:
    name: Terraform Apply
    needs: plan
    if: needs.plan.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_wrapper: false

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Download Plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: tfplan-${{ inputs.state-key }}
          path: ${{ inputs.working-directory }}

      - name: Terraform Init
        working-directory: ${{ inputs.working-directory }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: 'true'
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ inputs.state-key }}" \
            -backend-config="use_oidc=true"

      - name: Terraform Apply
        working-directory: ${{ inputs.working-directory }}
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: 'true'
        run: terraform apply -input=false tfplan
