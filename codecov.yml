# codecov.yml — Codecov configuration for unified coverage reporting
# Issue #424 — Part of unified coverage initiative (Issue #422)
#
# Flags:
#   pester — PowerShell tests covering scripts/
#   pytest — Python tests covering src/
#
# Requires: Issue #423 (pytest upload) and #427 (orchestrator flags)
# to be deployed before or with this file for after_n_builds: 2 to work.

codecov:
  require_ci_to_pass: true
  notify:
    after_n_builds: 2

coverage:
  precision: 2
  round: down
  range: "80...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
      pester:
        flags:
          - pester
        target: auto
        threshold: 1%
      pytest:
        flags:
          - pytest
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%

flags:
  pester:
    paths:
      - scripts/
    carryforward: true
  pytest:
    paths:
      - src/
    carryforward: true

parsers:
  jacoco:
    partials_as_hits: true

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: true
  show_carryforward_flags: true

ignore:
  - "docs/**"
  - "deploy/**"
  - "workflows/**"
  - "config/**"
  - "external/**"
  - "logs/**"
  - "tests/**"
