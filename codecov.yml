# codecov.yml — Codecov configuration for unified coverage reporting
#
# Flags:
#   pester — PowerShell tests covering scripts/
#   pytest — Python tests covering src/
#   vitest — Vitest tests covering data-management/viewer/frontend/src/
#   terraform — Terraform tests covering infrastructure/terraform/

codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "80...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
      pester:
        flags:
          - pester
        target: auto
        threshold: 1%
      pytest:
        flags:
          - pytest
        target: auto
        threshold: 1%
      pytest-dataviewer:
        flags:
          - pytest-dataviewer
        target: auto
        threshold: 1%
      vitest:
        flags:
          - vitest
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%

flags:
  pester:
    paths:
      - scripts/
    carryforward: true
  pytest:
    paths:
      - src/
    carryforward: true
  pytest-dataviewer:
    paths:
      - data-management/viewer/backend/src/
    carryforward: true
  vitest:
    paths:
      - data-management/viewer/frontend/src/
    carryforward: true
  terraform:
    paths:
      - infrastructure/terraform/
    carryforward: true

parsers:
  jacoco:
    partials_as_hits: true

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false
  show_carryforward_flags: true

ignore:
  - "docs/**"
  - "deploy/**"
  - "workflows/**"
  - "config/**"
  - "external/**"
  - "logs/**"
  - "tests/**"
