# codecov.yml — Codecov configuration for unified coverage reporting
#
# Flags:
#   go — Go tests covering infrastructure/terraform/e2e/
#   pester — PowerShell tests covering scripts/
#   pytest — Python tests covering training/
#   pytest-dataviewer — Dataviewer backend tests covering data-management/viewer/backend/src/
#   pytest-evaluation — Evaluation tests covering evaluation/
#   pytest-fuzz — Python fuzz regression tests covering tests/, backend, and training
#   terraform — Terraform tests covering infrastructure/terraform/
#   vitest — Vitest tests covering data-management/viewer/frontend/src/

codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "80...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%
      go:
        flags:
          - go
        target: auto
        threshold: 1%
      pester:
        flags:
          - pester
        target: auto
        threshold: 1%
      pytest:
        flags:
          - pytest
        target: auto
        threshold: 1%
      pytest-dataviewer:
        flags:
          - pytest-dataviewer
        target: auto
        threshold: 1%
      terraform:
        flags:
          - terraform
        target: auto
        threshold: 1%
      vitest:
        flags:
          - vitest
        target: auto
        threshold: 1%
      pytest-fuzz:
        flags:
          - pytest-fuzz
        target: auto
        threshold: 1%
      pytest-evaluation:
        flags:
          - pytest-evaluation
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%
      go:
        flags:
          - go
        informational: true
      pester:
        flags:
          - pester
        informational: true
      pytest:
        flags:
          - pytest
        informational: true
      pytest-dataviewer:
        flags:
          - pytest-dataviewer
        informational: true
      terraform:
        flags:
          - terraform
        informational: true
      vitest:
        flags:
          - vitest
        informational: true
      pytest-fuzz:
        flags:
          - pytest-fuzz
        informational: true
      pytest-evaluation:
        flags:
          - pytest-evaluation
        informational: true

flags:
  go:
    paths:
      - infrastructure/terraform/e2e/
    carryforward: true
  pester:
    paths:
      - scripts/
    carryforward: true
  pytest:
    paths:
      - training/
    carryforward: true
  pytest-dataviewer:
    paths:
      - data-management/viewer/backend/src/
    carryforward: true
  terraform:
    paths:
      - infrastructure/terraform/
    carryforward: true
  vitest:
    paths:
      - data-management/viewer/frontend/src/
    carryforward: true
  pytest-fuzz:
    paths:
      - tests/
      - data-management/viewer/backend/src/
      - training/
    carryforward: true
  pytest-evaluation:
    paths:
      - evaluation/
    carryforward: true

parsers:
  jacoco:
    partials_as_hits: true

comment:
  layout: "header, diff, flags, files"
  behavior: default
  require_changes: false
  show_carryforward_flags: true

ignore:
  - "docs/**"
  - "deploy/**"
  - "workflows/**"
  - "config/**"
  - "external/**"
  - "logs/**"
  - "tests/**"
