# Kyverno admission-controller HelmRelease.
# Replica counts and PDB use a Helm ternary against `.Values.singleNode` so a
# parent chart (or per-cluster overlay rendering this HelmRelease through Helm)
# selects single-node (1 replica, no PDB) vs multi-node (3 replicas, PDB on).
# `failurePolicy: Fail` matches the policy contract in
# fleet-deployment/gitops/clusters/base/admission/kyverno-{sigstore,notation}-policy.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 15m
  chart:
    spec:
      chart: kyverno
      version: ~3.2.0
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 1h
  install:
    createNamespace: true
  values:
    replicaCount: "{{ .Values.singleNode | ternary 1 3 }}"
    admissionController:
      replicas: "{{ .Values.singleNode | ternary 1 3 }}"
      failurePolicy: Fail
    backgroundController:
      replicas: "{{ .Values.singleNode | ternary 1 3 }}"
    cleanupController:
      replicas: "{{ .Values.singleNode | ternary 1 3 }}"
    reportsController:
      replicas: "{{ .Values.singleNode | ternary 1 3 }}"
    podDisruptionBudget:
      enabled: "{{ .Values.singleNode | ternary false true }}"
