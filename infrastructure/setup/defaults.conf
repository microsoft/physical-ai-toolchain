# Default configuration for 002-setup deployment scripts
# Override via command-line arguments or environment variables

# Helm Chart Versions
GPU_OPERATOR_VERSION="${GPU_OPERATOR_VERSION:-v25.3.4}"
KAI_SCHEDULER_VERSION="${KAI_SCHEDULER_VERSION:-v0.5.5}"
OSMO_CHART_VERSION="${OSMO_CHART_VERSION:-1.0.1}"
OSMO_IMAGE_VERSION="${OSMO_IMAGE_VERSION:-6.0.0}"
OSMO_PRERELEASE_CHART_VERSION="${OSMO_PRERELEASE_CHART_VERSION:-1.1.0}"
OSMO_PRERELEASE_IMAGE_VERSION="${OSMO_PRERELEASE_IMAGE_VERSION:-v2026.02.22}"
OSMO_USE_PRERELEASE="${OSMO_USE_PRERELEASE:-false}"
NGC_API_KEY="${NGC_API_KEY:-}"
NVCR_PULL_SECRET="${NVCR_PULL_SECRET:-nvcr-pull-secret}"

# Kubernetes Namespaces
NS_OSMO="${NS_OSMO:-osmo}"
NS_OSMO_CONTROL_PLANE="${NS_OSMO_CONTROL_PLANE:-osmo-control-plane}"
NS_OSMO_OPERATOR="${NS_OSMO_OPERATOR:-osmo-operator}"
NS_OSMO_WORKFLOWS="${NS_OSMO_WORKFLOWS:-osmo-workflows}"
NS_AZUREML="${NS_AZUREML:-azureml}"
NS_GPU_OPERATOR="${NS_GPU_OPERATOR:-gpu-operator}"
NS_KAI_SCHEDULER="${NS_KAI_SCHEDULER:-kai-scheduler}"

# Secret Names
SECRET_MEK="${SECRET_MEK:-mek-config}"
SECRET_POSTGRES="${SECRET_POSTGRES:-db-secret}"
SECRET_REDIS="${SECRET_REDIS:-redis-secret}"

# Timeouts
TIMEOUT_DEPLOY="${TIMEOUT_DEPLOY:-600s}"
TIMEOUT_WAIT="${TIMEOUT_WAIT:-300}"

# Helm Repositories
HELM_REPO_NVIDIA="${HELM_REPO_NVIDIA:-https://helm.ngc.nvidia.com/nvidia}"
HELM_REPO_GPU_OPERATOR="${HELM_REPO_GPU_OPERATOR:-https://helm.ngc.nvidia.com/nvidia}"
HELM_REPO_KAI="${HELM_REPO_KAI:-https://nvidia.github.io/k8s-device-scheduler/}"
HELM_REPO_OSMO="${HELM_REPO_OSMO:-https://helm.ngc.nvidia.com/nvidia/osmo}"

# Default Terraform Directory (relative to 002-setup)
DEFAULT_TF_DIR="${DEFAULT_TF_DIR:-../001-iac}"

# AzureML Extension Configuration
AZUREML_EXTENSION_NAME="${AZUREML_EXTENSION_NAME:-aml-extension}"
AZUREML_EXTENSION_VERSION="${AZUREML_EXTENSION_VERSION:-1.3.1}"
AZUREML_RELEASE_NS="${AZUREML_RELEASE_NS:-azureml}"
AZUREML_RELAY_NS="${AZUREML_RELAY_NS:-azureml-hybrid-relay}"

# OSMO Component Names
OSMO_SERVICE_CHART="${OSMO_SERVICE_CHART:-osmo-service}"
OSMO_ROUTER_CHART="${OSMO_ROUTER_CHART:-osmo-router}"
OSMO_WEBUI_CHART="${OSMO_WEBUI_CHART:-osmo-web-ui}"
OSMO_BACKEND_CHART="${OSMO_BACKEND_CHART:-backend-operator}"

# Workflow Template
WORKFLOW_TEMPLATE="${WORKFLOW_TEMPLATE:-workflow-config.template.json}"

# Workload Identity Defaults
WORKFLOW_SERVICE_ACCOUNT="${WORKFLOW_SERVICE_ACCOUNT:-osmo-workflow}"
WI_FEDERATED_SUBJECT="${WI_FEDERATED_SUBJECT:-system:serviceaccount}"

# OSMO Pool Configuration (pool list derived from terraform node_pools output)
# DEFAULT_POOL selects which node pool the shared "default" pool targets.
# When empty, the first pool alphabetically from terraform output is auto-selected.
# Override via .env.local: DEFAULT_POOL=h100gpu
DEFAULT_POOL="${DEFAULT_POOL:-}"

# Dataset Configuration Defaults
DATASET_CONTAINER_NAME="${DATASET_CONTAINER_NAME:-datasets}"
DATASET_BUCKET_NAME="${DATASET_BUCKET_NAME:-training}"

# Dataviewer Container Images
DATAVIEWER_BACKEND_IMAGE="${DATAVIEWER_BACKEND_IMAGE:-dataviewer-backend}"
DATAVIEWER_FRONTEND_IMAGE="${DATAVIEWER_FRONTEND_IMAGE:-dataviewer-frontend}"
DATAVIEWER_IMAGE_TAG="${DATAVIEWER_IMAGE_TAG:-latest}"
