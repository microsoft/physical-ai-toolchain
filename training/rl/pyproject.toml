[project]
name = "robotics-training-rl"
version = "0.1.0"
description = "RL training workflow runtime dependencies"
requires-python = ">=3.11,<3.12"
dependencies = [
    "numpy==2.4.4",
    "azure-core==1.39.0",
    "azure-storage-blob==12.28.0",
    "azure-identity==1.25.3",
    "azure-ai-ml==1.32.0",
    "marshmallow==4.2.3",
    "mlflow==3.10.1",
    "packaging==26.0",
    "psutil==7.2.2",
    "pynvml==13.0.1",
    "pyperclip==1.11.0",
    "cryptography==46.0.6",
    "pyjwt==2.12.1",
    "azureml-mlflow==1.62.0.post2",
    "rsl-rl-lib==5.0.1",
    "skrl==1.4.3",
    "tensordict==0.11.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = false
