[project]
name = "robotics-training-rl"
version = "0.1.0"
description = "RL training workflow runtime dependencies"
requires-python = ">=3.11,<3.12"
dependencies = [
    "numpy>=1.26.0,<3.0.0",
    "azure-core==1.39.0",
    "azure-storage-blob>=12.10.0",
    "azure-identity==1.25.3",
    "azure-ai-ml==1.32.0",
    "marshmallow>=3.5,<4.3.0",
    "mlflow>=2.0.0,<4.0.0",
    "packaging>=25,<27",
    "psutil>=5.9.0",
    "pynvml>=11.5.0",
    "pyperclip==1.11.0",
    "cryptography>=46.0.0",
    "pyjwt>=2.12.1",
    "azureml-mlflow==1.62.0.post2",
    "rsl-rl-lib==5.0.1",
    "skrl>=1.4.3",
    "tensordict>=0.7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = false
