workflow:
  name: vla-openpi-training
  timeout:
    exec_timeout: 24h
  resources:
    default:
      gpu: "{{ gpu }}"
      cpu: "{{ cpu }}"
      memory: "{{ memory }}"
      storage: 200Gi
  tasks:
    - name: openpi-train
      image: "{{ image }}"
      command:
        - /bin/bash
        - /tmp/entry.sh
      credentials:
        huggingface:
          HF_TOKEN: hf_token
      environment:
        NVIDIA_DRIVER_CAPABILITIES: "all"
        VLA_MODEL_ID: "{{ vla_model_id }}"
        OPENPI_VARIANT: "{{ openpi_variant }}"
        DATASET_REPO_ID: "{{ dataset_repo_id }}"
        DATASET_ROOT: "{{ dataset_root }}"
        LANGUAGE_INSTRUCTION: "{{ language_instruction }}"
        OUTPUT_DIR: "{{ output_dir }}"
        JOB_NAME: "{{ job_name }}"
        TRAINING_STEPS: "{{ training_steps }}"
        BATCH_SIZE: "{{ batch_size }}"
        LEARNING_RATE: "{{ learning_rate }}"
        LR_WARMUP_STEPS: "{{ lr_warmup_steps }}"
        LORA_RANK: "{{ lora_rank }}"
        LORA_ALPHA: "{{ lora_alpha }}"
        FINE_TUNING_MODE: "{{ fine_tuning_mode }}"
        ACTION_HORIZON: "{{ action_horizon }}"
        FLOW_MATCHING_STEPS: "{{ flow_matching_steps }}"
        SAVE_FREQ: "{{ save_freq }}"
        SYSTEM_METRICS: "{{ system_metrics }}"
        EXPERIMENT_NAME: "{{ experiment_name }}"
        REGISTER_CHECKPOINT: "{{ register_checkpoint }}"
        STORAGE_ACCOUNT: "{{ storage_account }}"
        STORAGE_CONTAINER: "{{ storage_container }}"
        BLOB_PREFIX: "{{ blob_prefix }}"
        AZURE_SUBSCRIPTION_ID: "{{ azure_subscription_id }}"
        AZURE_RESOURCE_GROUP: "{{ azure_resource_group }}"
        AZUREML_WORKSPACE_NAME: "{{ azure_workspace_name }}"
        AZURE_AUTHORITY_HOST: "{{ azure_authority_host }}"
        MLFLOW_TRACKING_TOKEN_REFRESH_RETRIES: "{{ mlflow_token_refresh_retries }}"
        MLFLOW_HTTP_REQUEST_TIMEOUT: "{{ mlflow_http_request_timeout }}"
        ENCODED_ARCHIVE: "{{ encoded_archive }}"
        PAYLOAD_ROOT: "{{ payload_root }}"
      files:
        - path: /tmp/entry.sh
          contents: |
            #!/bin/bash
            set -euo pipefail

            echo "=== OpenPI (pi0/pi0.5) Training Workflow ==="
            echo "Variant: ${OPENPI_VARIANT}"
            echo "Base Model: ${VLA_MODEL_ID}"
            echo "Fine-Tuning Mode: ${FINE_TUNING_MODE}"
            echo "Dataset: ${DATASET_REPO_ID}"
            echo "Language Instruction: ${LANGUAGE_INSTRUCTION}"
            echo "Action Horizon: ${ACTION_HORIZON}"
            echo "Flow Matching Steps: ${FLOW_MATCHING_STEPS}"
            echo "LoRA Rank: ${LORA_RANK}"
            echo "Job Name: ${JOB_NAME}"
            echo "Output Dir: ${OUTPUT_DIR}"
            echo "Logging: Azure ML MLflow"

            # Install system dependencies
            echo "Installing system dependencies..."
            apt-get update -qq && apt-get install -y -qq \
              ffmpeg \
              libgl1-mesa-glx \
              libglib2.0-0 \
              build-essential \
              gcc \
              unzip \
              python3-dev \
              git \
              > /dev/null 2>&1

            # Install UV package manager
            echo "Installing UV package manager..."
            pip install --quiet uv==0.7.12

            # Unpack training scripts from base64-encoded payload
            ARCHIVE_PATH="/tmp/vla_payload.zip"
            PAYLOAD_ROOT="${PAYLOAD_ROOT:-/workspace/vla_payload}"
            mkdir -p "${PAYLOAD_ROOT}"
            if [[ -z "${ENCODED_ARCHIVE:-}" ]]; then
              echo "ERROR: ENCODED_ARCHIVE is not set or empty; training payload is required." >&2
              exit 1
            fi
            printf '%s' "${ENCODED_ARCHIVE}" | base64 -d > "${ARCHIVE_PATH}"
            unzip -oq "${ARCHIVE_PATH}" -d "${PAYLOAD_ROOT}"
            export PYTHONPATH="${PAYLOAD_ROOT}/src:${PYTHONPATH:-}"
            echo "Training scripts unpacked to ${PAYLOAD_ROOT}/src"

            # Install OpenPI and dependencies
            # OpenPI provides the pi0 / pi0.5 fine-tuning API
            echo "Installing OpenPI and dependencies..."
            uv pip install --system \
              "openpi-client" \
              "lerobot>=0.3.0,<0.4.0" \
              "transformers>=4.40.0" \
              "peft>=0.10.0" \
              "accelerate>=0.28.0" \
              "flash-attn>=2.5.0" \
              "huggingface-hub[hf_xet]>=0.31.4,<1.0.0" \
              "datasets" \
              "azure-identity" \
              "azure-ai-ml" \
              "azureml-mlflow" \
              "mlflow>=2.8.0,<3.0.0"

            # Install OpenPI from source for full fine-tuning capabilities
            echo "Installing OpenPI from source..."
            pip install --quiet "openpi @ git+https://github.com/Physical-Intelligence/openpi.git"

            # Download dataset from Azure Blob Storage when configured
            if [[ -n "${STORAGE_ACCOUNT:-}" ]]; then
              echo "Downloading dataset from Azure Blob Storage..."
              python3 -m training.scripts.lerobot.download_dataset
              echo "Dataset downloaded to: ${DATASET_ROOT}/${DATASET_REPO_ID}"
            fi

            # Run pi0/pi0.5 training via Python orchestrator
            echo "Starting OpenPI fine-tuning (${OPENPI_VARIANT})..."
            python3 -m training.scripts.vla.train \
              --model-type "${OPENPI_VARIANT}" \
              --model-id "${VLA_MODEL_ID}" \
              --dataset-repo-id "${DATASET_REPO_ID}" \
              --dataset-root "${DATASET_ROOT}" \
              --language-instruction "${LANGUAGE_INSTRUCTION}" \
              --output-dir "${OUTPUT_DIR}" \
              --training-steps "${TRAINING_STEPS}" \
              --batch-size "${BATCH_SIZE}" \
              --learning-rate "${LEARNING_RATE}" \
              --fine-tuning-mode "${FINE_TUNING_MODE}" \
              --lora-rank "${LORA_RANK}" \
              --lora-alpha "${LORA_ALPHA}" \
              --action-horizon "${ACTION_HORIZON}" \
              --flow-matching-steps "${FLOW_MATCHING_STEPS}" \
              --save-freq "${SAVE_FREQ}"

            echo "=== OpenPI Training Complete ==="
            ls -la "${OUTPUT_DIR}/" 2>/dev/null || true

default-values:
  image: pytorch/pytorch:2.4.1-cuda12.4-cudnn9-runtime
  encoded_archive: ""
  payload_root: /workspace/vla_payload
  vla_model_id: physical-intelligence/pi0
  openpi_variant: pi0
  gpu: 1
  cpu: 16
  memory: 96Gi
  dataset_repo_id: ""
  dataset_root: /workspace/data
  language_instruction: "Pick up the object and place it in the target location"
  output_dir: /workspace/outputs/train
  job_name: openpi-training
  training_steps: "50000"
  batch_size: "8"
  learning_rate: "1e-5"
  lr_warmup_steps: "500"
  lora_rank: "32"
  lora_alpha: "64"
  fine_tuning_mode: lora
  action_horizon: "50"
  flow_matching_steps: "10"
  save_freq: "5000"
  system_metrics: "true"
  experiment_name: ""
  register_checkpoint: ""
  storage_account: ""
  storage_container: ""
  blob_prefix: ""
  azure_subscription_id: ""
  azure_resource_group: ""
  azure_workspace_name: ""
  azure_authority_host: ""
  mlflow_token_refresh_retries: "5"
  mlflow_http_request_timeout: "1200"
